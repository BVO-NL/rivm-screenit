<app-base-dialog [titel]="error.message" contentPadding="0">
  <table class="ds-table w-100" body>
    <thead>
    <tr class="ds-header-row">
      <th class="ds-header-cell">Intakelocatie</th>
      <th class="ds-header-cell">Afspraakslots</th>
    </tr>
    </thead>
    <tbody>
      @for (locatie of error.afspraakslots | keyvalue; track locatie) {
        <tr class="ds-row">
          <td class="ds-cell">{{ locatie.key }}</td>
          <td class="ds-cell">
            @for (slot of locatie.value; track slot) {
              <div>{{ slot }}</div>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
  <div buttons>
    <button ds-button-secondary data-testid="btn_sluiten" (click)="sluiten()">Sluiten</button>
  </div>
</app-base-dialog>
