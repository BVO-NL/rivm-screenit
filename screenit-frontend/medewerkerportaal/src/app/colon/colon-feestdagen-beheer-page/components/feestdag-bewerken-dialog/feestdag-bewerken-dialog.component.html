<app-base-dialog [titel]="modalTitle" size="md">
  <form [formGroup]="feestdagForm" body class="row form-in-modal" novalidate>
    <div class="col">
      <ds-input [errorMessage]="{'required': 'De naam is verplicht'}" data-testid="input_feestdag_naam"
                formControlName="naam"
                label="Naam"
                maxlength="255"/>
      <ds-datepicker
        [errorMessage]="{required: 'De datum is verplicht', invalidDate: 'De ingevoerde datum is niet valide'}"
        [min]="minDatum"
        formControlName="datum"
        label="Datum"/>
      <app-colon-rooster-beperking formControlName="beperking" label="Beperking"/>
    </div>
  </form>
  <div buttons class="btn-group">
    <button (click)="cancel()" ds-button-secondary>Annuleren</button>
    <button (click)="save()" [disabled]="feestdagForm.invalid" ds-button-primary>
      Opslaan
    </button>
  </div>
</app-base-dialog>
