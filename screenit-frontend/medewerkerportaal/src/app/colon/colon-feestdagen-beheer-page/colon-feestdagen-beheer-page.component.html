<app-page titel="Roosterbeperkingen voor feestdagen">
  <ng-container header-actions>
    <button ds-button-primary (click)="openFeestdagDialog()" *appAutorisatie="toevoegenConstraint">
      <ds-icon [icon]="faAddIcon"></ds-icon>
      Feestdag
    </button>
  </ng-container>
  <table [dataSource]="dataSource()" [fullWidth]="true" ds-table matSort
         matSortActive="datum"
         matSortDirection="asc">
    <ng-container dsColumnDef="naam">
      <th *dsHeaderCellDef ds-header-cell mat-sort-header="naam">Naam</th>
      <td *dsCellDef="let row" ds-cell>{{ row.naam }}</td>
    </ng-container>

    <ng-container dsColumnDef="datum">
      <th ds-header-cell *dsHeaderCellDef mat-sort-header="datum"> Datum</th>
      <td ds-cell *dsCellDef="let element"> {{ element.datum | date: NL_DATE_FORMAT }}</td>
    </ng-container>

    <ng-container dsColumnDef="beperking">
      <th ds-header-cell *dsHeaderCellDef mat-sort-header="beperking"> Beperking</th>
      <td ds-cell *dsCellDef="let element"> {{ element.beperking | titlecase }}</td>
    </ng-container>

    <ng-container dsColumnDef="acties">
      <th ds-header-cell *dsHeaderCellDef></th>
      <td ds-cell *dsCellDef="let feestdag">
        <button (click)="openFeestdagDialog(feestdag)" *appAutorisatie="bewerkenConstraint" ds-button-icon
                ds-button-tertiary>
          <ds-icon [icon]="faEditIcon"/>
        </button>
        <button (click)="confirmDeleteFeestdag(feestdag)" *appAutorisatie="verwijderenConstraint" ds-button-icon
                ds-button-tertiary>
          <ds-icon [icon]="faDeleteIcon"/>
        </button>
      </td>
    </ng-container>

    <tr ds-header-row *dsHeaderRowDef="displayedColumns"></tr>
    <tr ds-row *dsRowDef="let row; columns: displayedColumns"></tr>
  </table>
</app-page>
