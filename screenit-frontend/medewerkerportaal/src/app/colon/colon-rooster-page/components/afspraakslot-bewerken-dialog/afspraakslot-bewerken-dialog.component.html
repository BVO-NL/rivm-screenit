<app-base-dialog [size]="isNieuw ? 'xl' : 'md'" [titel]="title">
  <form [formGroup]="afspraakslotForm" body class="row form-in-modal" novalidate>
    <div class="col">
      <app-kamer-selector [required]="true" formControlName="kamer" [inclusiefAlleKamers]="false"/>
      <ds-datepicker
        [errorMessage]="{required: 'De datum is verplicht', invalidDate: 'De ingevoerde datum is niet valide'}"
        [min]="minDatum"
        formControlName="datum"
        label="Datum"/>
      @if (isNieuw) {
        <ds-input
          [errorMessage]="{required: 'Het aantal afspraakslots is verplicht'}"
          [label]="'Aantal afspraakslots (van ' + instellingen().duurAfspraakInMinuten + ' minuten)'"
          formControlName="aantalBlokken"
          minValue="1"
          type="number"
        />
      }

      <div class="tijd-grid">
        <app-timepicker
          [required]="true"
          formControlName="vanaf"
          label="Starttijd"
        />
        <app-timepicker
          formControlName="tot"
          label="Eindtijd"
        />
      </div>
    </div>
    @if (isNieuw) {
      <app-bulk-aanmaken class="col" formControlName="herhaling"/>
    }
  </form>
  <ng-container verwijder-button>
    @if (verwijderenToegestaan) {
      <button (click)="confirmDeleteSlot()"
              data-testid="btn-verwijderen"
              ds-button-delete>
        Verwijderen
      </button>
    }
  </ng-container>
  <ng-container buttons>
    <div class="btn-group">
      <button (click)="cancel()" data-testid="btn_annuleren" ds-button-secondary type="button">{{ bewerkenToegestaan ? 'Annuleren' : 'Sluiten' }}</button>
      @if (bewerkenToegestaan) {
        <button (click)="save()"
                [disabled]="afspraakslotForm.invalid"
                data-testid="btn_opslaan"
                ds-button-primary>
          Opslaan
        </button>
      }
    </div>
  </ng-container>
</app-base-dialog>
