<app-base-dialog [size]="isNieuw ? 'xl' : 'lg'" [titel]="title">
  <form [formGroup]="blokkadeForm" body class="form-in-modal" novalidate>
    <div class="blokkade-layout">
      <div class="blokkade-kolom-links">
        <div class="blokkade-form-grid">
          <app-kamer-selector formControlName="kamer" [required]="!alleKamersCtrl.value" [inclusiefAlleKamers]="false"/>

          @if (isNieuw) {
            <ds-checkbox
              class="grid-alle-kamers"
              data-testid="checkbox_alle_kamers"
              formControlName="alleKamers">
              Alle kamers
            </ds-checkbox>
          }

          <ds-datepicker
            [min]="minDatum"
            class="grid-datum"
            data-testid="input_datum"
            formControlName="datum"
            label="Datum"
          />

          <ds-checkbox class="grid-hele-dag" data-testid="checkbox_hele_dag" formControlName="heleDag">Hele dag</ds-checkbox>

          <div class="grid-starteindtijd">
            <app-timepicker
              data-testid="input_start_tijd"
              formControlName="vanaf"
              label="Starttijd"
              [required]="!heleDagCtrl.value"
            />

            <app-timepicker
              data-testid="input_eind_tijd"
              formControlName="tot"
              label="Eindtijd"
              [required]="!heleDagCtrl.value"
            />
          </div>

          <ds-input
            [errorMessage]="{required: 'Omschrijving is verplicht'}"
            class="grid-omschrijving"
            data-testid="input_omschrijving"
            formControlName="omschrijving"
            label="Omschrijving"
            required
            type="text"
          />
        </div>
      </div>
      @if (isNieuw) {
        <div class="blokkade-kolom-rechts">
          <app-bulk-aanmaken class="grid-herhalen" formControlName="herhaling"/>
        </div>
      }

    </div>
  </form>
  @if (verwijderenToegestaan) {
    <button verwijder-button (click)="confirmDelete()" data-testid="btn-verwijderen" ds-button-delete type="button">Verwijderen</button>
  }
  <div buttons class="btn-group">
    <button (click)="cancel()" data-testid="btn_annuleren" ds-button-secondary type="button">{{ bewerkenToegestaan ? 'Annuleren' : 'Sluiten' }}</button>
    @if (bewerkenToegestaan) {
      <button (click)="save()" [disabled]="blokkadeForm.invalid" data-testid="btn_opslaan" ds-button-primary type="button">Opslaan</button>
    }
  </div>
</app-base-dialog>
