<div class="toolbar">
  <form [formGroup]="filterForm">
    <div class="display-flex gap-3">
      <app-kamer-selector [required]="true" formControlName="kamerId" data-testid="cb_kamer_selector" [inclusiefAlleKamers]="true"/>
      <ds-weekday-selector [required]="true" label="Dagen" formControlName="dagen" data-testid="tds_weekdagen_selector"/>
    </div>

    <div class="display-flex justify-content-between align-items-center">
      <div class="datum-tijd-grid">
        <ds-datepicker label="Vanaf" [required]="true" formControlName="startDatum" [min]="minDatum"/>
        <ds-datepicker label="Tot en met" [required]="true" formControlName="eindDatum" [min]="startDatumCtrl.value?.toISOString()"
                       [errorMessage]="{lessThanMinDate: 'De Vanaf datum moet voor de Tot en met datum liggen'}"/>

        <app-timepicker label="Starttijd" [required]="true" formControlName="startTijd" data-testid="start_tijd_input"/>
        <app-timepicker label="Eindtijd" [required]="true" formControlName="eindTijd" data-testid="eind_tijd_input"/>
        <ds-checkbox formControlName="heleDag" class="align-self-end pb-1">Hele dag</ds-checkbox>
      </div>
      <button ds-button-primary (click)="doFilter()" class="filter-btn" [disabled]="filterForm.invalid">Filteren</button>
    </div>
  </form>
</div>
