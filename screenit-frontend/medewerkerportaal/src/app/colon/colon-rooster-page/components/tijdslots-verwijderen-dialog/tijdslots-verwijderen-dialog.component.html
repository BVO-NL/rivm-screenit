<app-base-dialog class="tijdslots-verwijderen-modal" size="xl" titel="{{ typeTijdslot.label }} verwijderen">
  <div body class="display-flex flex-column">
    <app-tijdslots-verwijderen-filter (filter)="filter($event)"/>

    <div class="resultaten-tabel">
      <table [dataSource]="tijdslots()" [fullWidth]="true" ds-table matSort
             matSortActive="kamer"
             matSortDirection="asc"
             [hoverable]="true">
        <ng-container dsColumnDef="selection">
          <th *dsHeaderCellDef ds-header-cell>
            <ds-checkbox
              [ngModel]="allCheckboxesSelected()"
              [indeterminate]="anyCheckboxSelected()"
              (checkboxChanged)="toggleAll()"
            />
          </th>
          <td *dsCellDef="let row" ds-cell>
            <ds-checkbox
              (click)="$event.stopPropagation()"
              (change)="$event ? selectRow(row) : null"
              [ngModel]="rowIsSelected(row)"
            />
          </td>
        </ng-container>
        <ng-container dsColumnDef="kamer">
          <th *dsHeaderCellDef ds-header-cell>Kamer</th>
          <td *dsCellDef="let element" ds-cell>{{ element.kamer }}</td>
        </ng-container>

        <ng-container dsColumnDef="datum">
          <th ds-header-cell *dsHeaderCellDef> Datum</th>
          <td ds-cell *dsCellDef="let element"> {{ element.vanaf | date: NL_DATE_FORMAT }}</td>
        </ng-container>

        <ng-container dsColumnDef="starttijd">
          <th ds-header-cell *dsHeaderCellDef> Starttijd</th>
          <td ds-cell *dsCellDef="let element"> {{ element.vanaf | date: TIME_FORMAT }}</td>
        </ng-container>

        <ng-container dsColumnDef="eindtijd">
          <th ds-header-cell *dsHeaderCellDef> Eindtijd</th>
          <td ds-cell *dsCellDef="let element"> {{ element.tot | date: TIME_FORMAT }}</td>
        </ng-container>

        <tr ds-header-row *dsHeaderRowDef="displayedColumns"></tr>
        <tr *dsRowDef="let row; columns: displayedColumns" [ds-selectable-row]="rowIsSelected(row)" (click)="selectRow(row)"></tr>
        <ng-template dsNoDataRow>
          <tr class="ds-row">
            <td colspan="4" class="ds-cell">Er zijn geen {{ typeTijdslot.label | lowercase }} gevonden</td>
          </tr>
        </ng-template>
      </table>
      <ds-paginator [totalNumberOfItems]="alleTijdslots().length"
                    [pageSize]="pageSize"
                    [pageSizeOptions]="[10, 20, 50, 100, 500]"
                    (pageChanged)="handlePageChange($event)"
                    pageSizeSelectAppendTo="ds-footer"
      />
    </div>
  </div>
  <div buttons class="btn-group">
    <button ds-button-secondary (click)="cancel()">Annuleren</button>
    <button (click)="verwijderen()" [disabled]="selection.selected.length === 0" ds-button-delete-primary>Verwijderen</button>
  </div>
</app-base-dialog>
