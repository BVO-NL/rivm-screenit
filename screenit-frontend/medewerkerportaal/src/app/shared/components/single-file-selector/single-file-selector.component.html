<div class="ds-form-element">
  <div class="ds-form-element__label">
    {{ label() }}
    @if (required()) {
      <span class="ds-form-element__label__required-icon">*</span>
    }
  </div>
  <div class="ds-form-element-container">
    <div class="ds-form-element__input-container">
      @if (file) {
        <button ds-button-secondary (click)="clearFile()" [disabled]="isDisabled">
          <span>{{ file.name }}</span>
          <ds-icon [icon]="deleteIcon"></ds-icon>
        </button>

      } @else {
        <button ds-button-secondary (click)="openFileSelector()" [disabled]="isDisabled">
          <ds-icon [icon]="fileUpload"/>
          <span>Bladeren</span>
        </button>
      }
    </div>
  </div>
  <span class="ds-form-element-hint-error-container" [class.ds-form-element-hint-error-container--has-error]="fileCtrl.invalid">
    @if (fileCtrl.dirty) {
      <span class="ds-form-element-hint-error-container__error">
      @if (fileCtrl.hasError('required')) {
        <span>Het bestand is verplicht</span>
      }

        @if (fileCtrl.hasError('extensie')) {
          <span>{{ fileCtrl.getError('extensie') }}</span>
        }
    </span>
    }
  </span>
</div>

<input
  #fileSelector
  [disabled]="isDisabled"
  type="file"
  [accept]="acceptedMimetype()"
  [hidden]="true"
  (change)="verwerkBestand($event)"
>
