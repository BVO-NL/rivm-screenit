<app-base-dialog titel="Visitatie" size="lg">
  <form [formGroup]="editForm" body class="ds-visitatie-form-grid">
    <div class="visitatie-bestanden-upload">
      <div class="helft-width visitatie-form-links">
        <ds-input
          label="Omschrijving"
          formControlName="omschrijving"
          placeholder="Omschrijving"
          data-testid="input_omschrijving"
          required
          type="text"
        ></ds-input>

        <ds-dropdown
          label="Status"
          formControlName="status"
          [items]="mammaVisitatieStatusLijst"
          bindValue="waarde"
          bindLabel="naam"
          appendTo="body"
          data-testid="status_dropdown"
          [clearable]="false"
        />

        @if (visitatieTypeBe) {
          <ds-dropdown
            label="Beoordelingseenheid"
            formControlName="beoordelingseenheid"
            [clearable]="beoordelingseenheidCtrl.hasValidator(Validators.required)"
            [items]="beoordelingseenheden()"
            appendTo="body"
            bindLabel="naam"
            data-testid="beoordelingseenheid_dropdown"
          />
        }

        <app-single-file-selector
          [required]="false"
          formControlName="rapportage"
          acceptedExtensie="xlsx"
          data-testid="rapportage_input"
          label="Rapportage"
        />

        <app-single-file-selector
          [required]="false"
          formControlName="vragenlijst"
          acceptedExtensie="xlsx"
          data-testid="vragenlijst_input"
          label="Vragenlijst"
        />
      </div>

      <div class="helft-width visitatie-form-rechts">
        @if (isNieuw && !visitatieTypeBe) {
          <app-single-file-selector
            [required]="false"
            formControlName="insteltechniek"
            acceptedExtensie="csv"
            data-testid="insteltechniek_input"
            label="Insteltechniek"
            class="insteltechniek_input"
          ></app-single-file-selector>
          <ds-radiobutton
            label="Fotorichting"
            formControlName="fotorichting"
            [items]="getFotorichtingRadioItems()"
            name="fotorichting"
            data-testid="fotorichting_input_radio"
          ></ds-radiobutton>
        }

        @if (isNieuw && visitatieTypeBe) {
          <app-single-file-selector
            [required]="false"
            formControlName="intervalcarcinomen"
            acceptedExtensie="csv"
            data-testid="intervalcarcinomen_input"
            label="Intervalcarcinomen"
          ></app-single-file-selector>

          <app-single-file-selector
            [required]="false"
            formControlName="verwijzingen"
            acceptedExtensie="csv"
            data-testid="verwijzingen_input"
            label="Verwijzingen"
          ></app-single-file-selector>

          <app-single-file-selector
            [required]="false"
            formControlName="screenDetected"
            acceptedExtensie="csv"
            data-testid="screen_detected_input"
            label="T2+ screen detected"
          ></app-single-file-selector>

          <app-single-file-selector
            [required]="false"
            formControlName="protheses"
            acceptedExtensie="csv"
            data-testid="protheses_input"
            label="Protheses"
          ></app-single-file-selector>
        }
      </div>
    </div>
  </form>

  <div class="btn-group" buttons>
    <button ds-button-secondary (click)="sluitDialog()" data-testid="annuleren_btn">Annuleren</button>
    <button ds-button-primary (click)="opslaan()" data-testid="opslaan_btn">Opslaan</button>
  </div>
</app-base-dialog>
