<app-base-dialog titel="Visitatielijsten insteltechniek genereren">
  <form [formGroup]="genererenForm" body>
    <ds-input label="Omschrijving" formControlName="omschrijving" data-testid="input_omschrijving"/>

    <app-single-file-selector label="Bestand"
                              formControlName="bestand"
                              acceptedExtensie="csv"
                              id="bestand"
                              [required]="true"
                              data-testid="bestand_input"
    />
  </form>

  <div class="btn-group" buttons>
    <button ds-button-secondary (click)="sluitDialog()" data-testid="annuleren_btn">Annuleren</button>
    <button ds-button-primary (click)="rapportGenereren()" data-testid="genereren_btn">Rapport genereren</button>
  </div>
</app-base-dialog>
