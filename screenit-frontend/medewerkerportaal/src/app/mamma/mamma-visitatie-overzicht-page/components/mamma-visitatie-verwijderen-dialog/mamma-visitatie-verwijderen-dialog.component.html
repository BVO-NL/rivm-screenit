<app-base-dialog titel="Visistatie verwijderen">
  <div body class="body">
    <h3>Onderstaande visitatie definitief verwijderen?</h3>
    <div>Omschrijving: {{ visitatie.omschrijving }}</div>
    <div>Aangemaakt door: {{ visitatie.aangemaaktDoor }}</div>
  </div>
  <div buttons class="btn-group">
    <button type="button" class="btn" (click)="sluitDialog()">Nee</button>
    <button type="button" class="btn btn-primary" (click)="bevestigVerwijderen()">Ja</button>
  </div>
</app-base-dialog>
