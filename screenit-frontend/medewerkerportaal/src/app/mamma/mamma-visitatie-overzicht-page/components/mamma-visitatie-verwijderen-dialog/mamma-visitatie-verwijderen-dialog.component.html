<app-base-dialog titel="Visitatie verwijderen">
  <div body class="body">
    <div class="mb-2">Onderstaande visitatie definitief verwijderen?</div>
    <table>
      <tr>
        <td>Omschrijving</td>
        <td>{{ visitatie.omschrijving }}</td>
      </tr>
      <tr>
        <td>Aangemaakt door</td>
        <td>{{ visitatie.aangemaaktDoor }}</td>
      </tr>
    </table>
  </div>
  <div buttons class="btn-group">
    <button ds-button-secondary type="button" (click)="sluitDialog()" data-testid="annuleren_button">Annuleren</button>
    <button ds-button-delete-primary type="button" (click)="bevestigVerwijderen()" data-testid="verwijderen_button">Verwijderen</button>
  </div>
</app-base-dialog>
