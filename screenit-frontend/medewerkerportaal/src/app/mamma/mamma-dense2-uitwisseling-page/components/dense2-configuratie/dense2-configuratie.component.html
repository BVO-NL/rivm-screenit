<ds-card cardTitle="Configuratie"
         cardSubHeader="Vul hier de configuratie in voor de DENSE-2 studie. Links ziet u de projecten waarvoor de configuratie geldt en rechts de projectnaam.">
  <form [formGroup]="configuratieForm">
    <ds-input label="DENSE-2 CEM" formControlName="cem" data-testid="input_cem"/>
    <ds-input label="DENSE-2 MRI" formControlName="mri" data-testid="input_mri"/>
    <ds-input label="DENSE-2 Controlegroep" formControlName="controleGroep" data-testid="input_controleGroep"/>
    <ds-input label="DENSE-2 Herinnering CEM" formControlName="herinneringCem" data-testid="input_herinnering_cem"/>
    <ds-input label="DENSE-2 Herinnering MRI" formControlName="herinneringMri" data-testid="input_herinnering_mri"/>

    <app-project-selector formControlName="excludeProjecten" label="Deelnemers uit deze projecten excluderen"/>

    <ds-toggle label="Densiteit meting DENSE-2 opslaan" formControlName="metingOpslaan" [message]="metingOpslaanCtrl.value ? 'Aan' : 'Uit'"/>

  </form>
  <ng-template ds-footer-actions-right>
    <button ds-button-primary [disabled]="configuratieForm.invalid" (click)="configuratieOpslaan()">Opslaan</button>
  </ng-template>
</ds-card>
