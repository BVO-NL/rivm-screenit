<form class="row" [formGroup]="filterForm">
  <ds-card cardTitle="Periode en medewerker" class="col-md-3 col-12">
    <ds-duration-datepicker [inForm]="true" [min]="onderzoekMinDatum" label="Onderzoeksdatum" formControlName="onderzoeksdatum"/>
    <ds-dropdown label="Medewerker" [inForm]="true" [items]="medewerkers()" bindLabel="naam" bindValue="id" appendTo="body" formControlName="medewerkerId"/>
    <ds-dropdown
      label="Beoordelingseenheden"
      formControlName="beoordelingseenheidIds"
      [items]="beoordelingseenheden()"
      [multiple]="true"
      [inForm]="true"
      appendTo="body"
      bindValue="id"
      bindLabel="naam"
      data-testid="beoordelingseenheden-combobox"
    />

    <ds-dropdown
      label="Screeningseenheden"
      formControlName="screeningseenheidIds"
      [items]="screeningseenheden()"
      [multiple]="true"
      [inForm]="true"
      appendTo="body"
      bindValue="id"
      bindLabel="naam"
      data-testid="screeningseenheden-combobox"
    />
  </ds-card>

  <ds-card cardTitle="Specificaties onderzoek" class="col-md-6 col-12">
    <div class="row">
      <div class="col-6">
        <ds-dropdown [multiple]="true" bindLabel="naam" bindValue="waarde" [items]="filterOpties().redenFotobesprekingDoorMbber" [inForm]="true" appendTo="body"
                     formControlName="redenFotobesprekingDoorMbber"
                     label="Reden fotobespreking door MBB'er"/>
        <ds-dropdown [multiple]="true" bindLabel="naam" bindValue="waarde" [items]="filterOpties().redenFotobesprekingDoorRadioloog" [inForm]="true" appendTo="body"
                     formControlName="redenFotobesprekingDoorRadioloog"
                     label="Reden fotobespreking door radioloog"/>
        <ds-dropdown [multiple]="true" bindLabel="naam" bindValue="waarde" [items]="filterOpties().redenFotobesprekingMetMbber" [inForm]="true" appendTo="body"
                     formControlName="redenFotobesprekingMetMbber"
                     label="Reden fotobespreking met MBB'er"/>
      </div>
      <div class="col-6">
        <ds-dropdown [multiple]="true" bindLabel="naam" bindValue="waarde" [items]="filterOpties().redenDoorverwijzing" [inForm]="true" appendTo="body"
                     formControlName="redenDoorverwijzing"
                     label="Reden doorverwijzing"/>
        <ds-dropdown [multiple]="true" bindLabel="naam" bindValue="waarde" [items]="filterOpties().followUp" [inForm]="true" appendTo="body" formControlName="followUp"
                     label="Follow-up"/>
      </div>
    </div>
  </ds-card>

  <ds-card cardTitle="Client" class="col-md-3 col-12">
    <ds-input [inForm]="true" label="BSN" formControlName="bsn"/>
    <ds-datepicker [inForm]="true" label="Geboortedatum" formControlName="geboortedatum"/>
  </ds-card>
</form>

<div class="actions-right">
  <button type="submit" ds-button-primary (click)="zoeken()" data-testid="zoeken_btn">Zoeken</button>
</div>
