<app-page [titel]="paginaTitel()">
  <app-mamma-fotobespreking-filter (filter)="filterOnderzoeken($event)" class="mb-4"/>
  <app-mamma-fotobespreking-tabel (getOnderzoeken)="getOnderzoeken()" [onderzoeken]="onderzoeken()" [(paginering)]="paginering" [(sortering)]="sortering"
                                  [clientIds]="fotobespreking()?.clientIds"
                                  (selectionChanged)="geselecteerdeOnderzoeken.set($event)"/>
  <div class="btn-group mt-4">
    <button ds-button-secondary (click)="annuleren()" data-testid="annuleren_btn">Annuleren</button>
    <button ds-button-primary (click)="opslaan()" data-testid="opslaan_btn">Opslaan</button>
  </div>
</app-page>
