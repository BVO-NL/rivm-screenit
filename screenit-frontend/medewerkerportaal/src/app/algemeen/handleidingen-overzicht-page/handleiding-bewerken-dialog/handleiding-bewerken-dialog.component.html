<app-base-dialog titel="Handleiding bewerken" size="md">
  <form [formGroup]="handleidingForm" body class="row form-in-modal" novalidate>
    <div class="col">
      <app-single-file-selector
        label="Handleiding"
        formControlName="bestand"
        acceptedExtensie="pdf"
        data-testid="handleiding_uploaden"
      />
      <ds-input
        label="Bestandsnaam"
        formControlName="bestandsnaam"
        [errorMessage]="{minlength: 'De bestandsnaam moet minimaal 3 tekens bevatten', maxlength: 'De bestandsnaam mag maximaal 50 tekens bevatten'}"
        data-testid="bestandsnaam_input"
        required
        minlength="3"
        maxlength="50"
      />
    </div>
  </form>
  <div buttons class="btn-group">
    <button (click)="annuleren()" data-testid="annuleren_btn" ds-button-secondary>Annuleren</button>
    <button (click)="opslaan()" [disabled]="!isFormGeldig" ds-button-primary data-testid="opslaan_btn">
      Opslaan
    </button>
  </div>
</app-base-dialog>
