<app-base-dialog titel="Handleiding aanmaken" size="md">
  <form [formGroup]="handleidingForm" body class="row form-in-modal">
    <div class="col">
      <ds-file-uploader
        class="file-uploader"
        formControlName="handleidingenUpload"
        [options]="fileUploaderOptions"
        label="Handleiding uploaden"
        data-testid="handleidingen_uploaden"
      />
      <div>
        @for (handleiding of handleidingen; track handleiding.name; let i = $index) {
          <ds-file-uploader-file
            [file]="handleiding"
            (deleteClicked)="verwijderHandleidingVanLijst(handleiding)"
          />
          <ds-input
            label="Bestandsnaam"
            [errorMessage]="{'maxlength': 'De bestandsnaam mag maximaal 50 tekens bevatten', 'minlength': 'De bestandsnaam moet minimaal 3 tekens bevatten'}"
            [formControl]="bestandsnamen.at(i)"
            data-testid="bestandsnaam_input"
            required
            minlength="3"
            maxlength="50"
          />
        }
      </div>
    </div>
  </form>
  <div buttons class="btn-group">
    <button (click)="annuleren()" data-testid="annuleren_btn" ds-button-secondary>Annuleren</button>
    <button (click)="opslaan()" data-testid="opslaan_btn" [disabled]="!isFormGeldig" ds-button-primary>Opslaan</button>
  </div>
</app-base-dialog>
