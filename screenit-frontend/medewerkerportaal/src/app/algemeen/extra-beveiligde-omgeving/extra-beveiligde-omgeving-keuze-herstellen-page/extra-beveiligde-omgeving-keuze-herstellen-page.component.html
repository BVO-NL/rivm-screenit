<app-page titel="Keuze gebruik gegevens herstellen">
  <form [formGroup]="formGroup" (ngSubmit)="keuzeHerstellen()">
    <div class="filter mb-3">
      <div class="row">
        <div class="col-12 col-md-6">
          <ds-datepicker required label="Geboortedatum" formControlName="geboortedatum" [max]="maxGeboorteDatum" class="col-12 mb-3" data-testid="geboortedatum_input"
                         [errorMessage]="{required: 'De geboortedatum is verplicht', max: 'De geboortedatum mag niet in de toekomst liggen' }"/>

          <ds-input data-testid="bsn_input" label="Burgerservicenummer" formControlName="bsn" required
                    [errorMessage]="{ required: 'Het burgerservicenummer is verplicht', bsn: bsnCtrl.getError('bsn') }" class="col-12 mb-3"/>

        </div>
        <div class="col-12 col-md-6">
          <app-single-file-selector [required]="true" formControlName="bestand" acceptedExtensie="pdf" data-testid="bestand_input"/>
        </div>
      </div>
      <div class="form-actions">
        <button ds-button-primary type="submit">Bevestigen</button>
      </div>
    </div>
  </form>
</app-page>
