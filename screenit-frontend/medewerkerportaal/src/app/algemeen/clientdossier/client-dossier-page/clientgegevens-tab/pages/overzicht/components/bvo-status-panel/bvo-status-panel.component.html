<ds-card cardTitle="Status bevolkingsonderzoek">

  <table ds-table [dataSource]="bvoStatussen()" [fullWidth]="true">
    <ng-container dsColumnDef="bevolkingsonderzoek">
      <th *dsHeaderCellDef ds-header-cell>Bevolkingsonderzoek</th>
      <td *dsCellDef="let row" ds-cell>{{ row.bevolkingsonderzoek | bvoLabel }}</td>
    </ng-container>

    <ng-container dsColumnDef="status">
      <th *dsHeaderCellDef ds-header-cell>Status</th>
      <td *dsCellDef="let row" ds-cell>
        <app-actief-indicator [actief]="row.actief"/>
      </td>
    </ng-container>

    <ng-container dsColumnDef="vervolg-indicatie">
      <th *dsHeaderCellDef ds-header-cell>Vervolg indicatie</th>
      <td *dsCellDef="let row" ds-cell>
        {{ row.datumVolgendeUitnodiging ? `Volgende uitnodiging op ${(row.datumVolgendeUitnodiging | date: NL_DATE_FORMAT)}` : '-' }}
      </td>
    </ng-container>

    <tr ds-header-row *dsHeaderRowDef="displayedColumns"></tr>
    <tr ds-row *dsRowDef="let row; columns: displayedColumns"></tr>
  </table>
</ds-card>
