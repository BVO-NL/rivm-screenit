<ds-card cardTitle="M. van Dongen (v)">
  <ng-template ds-card-header-content>
    <button ds-button-tertiary>
      <ds-icon [icon]="faPencil"/>
      Bewerken
    </button>
  </ng-template>
  <div class="client-info-lijst">
    <div class="client-info-rij">
      <span class="client-info-label">Doelgroep</span>
      <span class="client-info-waarde">
        <ds-badge type="info" label="Mindervalide"/>
      </span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Overlijdensdatum</span>
      <span class="client-info-waarde">
        <ds-badge type="error" label="10-02-2025"/>
      </span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Burgerservicenummer</span>
      <span class="client-info-waarde">123456789</span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Geboortedatum</span>
      <span class="client-info-waarde">14-06-1987</span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Geboortenaam</span>
      <span class="client-info-waarde">Van Dongen</span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Aanspreekvorm</span>
      <span class="client-info-waarde">Mevrouw</span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Genderidentiteit</span>
      <span class="client-info-waarde">Vrouw</span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Mobiel nummer</span>
      <span class="client-info-waarde">06 12345678</span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">Extra nummer</span>
      <span class="client-info-waarde">010 1234567</span>
    </div>
    <div class="client-info-rij">
      <span class="client-info-label">E-mailadres</span>
      <span class="client-info-waarde">m.vandongen&#64;example.org</span>
    </div>
  </div>
</ds-card>
