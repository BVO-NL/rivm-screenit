<ds-card cardTitle="Projecten">
  <table ds-table [dataSource]="projecten()" [fullWidth]="true">
    <ng-container dsColumnDef="bevolkingsonderzoeken">
      <th *dsHeaderCellDef ds-header-cell>Bevolkingsonderzoek(en)</th>
      <td *dsCellDef="let row" ds-cell>
        <app-bvo-indicator [bvos]="row.bevolkingsonderzoeken"/>
      </td>
    </ng-container>

    <ng-container dsColumnDef="naam">
      <th *dsHeaderCellDef ds-header-cell>Projectnaam</th>
      <td *dsCellDef="let row" ds-cell>{{ row.projectNaam }}</td>
    </ng-container>

    <ng-container dsColumnDef="status">
      <th *dsHeaderCellDef ds-header-cell>Status</th>
      <td *dsCellDef="let row" ds-cell>
        <app-actief-indicator [actief]="row.actief"/>
      </td>
    </ng-container>

    <ng-template dsNoDataRow>
      <tr class="ds-row">
        <td class="ds-cell" colspan="3">Er zijn geen projecten gevonden</td>
      </tr>
    </ng-template>

    <tr ds-header-row *dsHeaderRowDef="displayedColumns"></tr>
    <tr ds-row *dsRowDef="let row; columns: displayedColumns"></tr>
  </table>
</ds-card>
