<app-page titel="Cliënt dossier" [zonderMarge]="true">
  <ng-container header-actions>
    <button ds-button-secondary routerLink="/client/zoeken">
      <ds-icon [icon]="faSearch"/>
      Cliënt zoeken
    </button>
  </ng-container>
  <ds-tab-group [selectedIndex]="0">
    <ds-tab titel="Cliëntgegevens">
      <ng-template dsLazyContentDirective>
        <app-clientgegevens-tab [client]="client()"/>
      </ng-template>
    </ds-tab>
  </ds-tab-group>
</app-page>
