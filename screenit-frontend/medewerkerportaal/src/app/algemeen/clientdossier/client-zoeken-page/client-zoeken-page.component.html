<app-page titel="Cliënten zoeken">
  <div class="zoeken-pagina">
    <app-client-zoeken-filter (zoeken)="zoekClienten($event)"/>
    <div class="resultaat-container">
      @if (heeftGezocht()) {
        <app-client-zoeken-tabel [clienten]="clienten()" (navigate)="navigeerNaarClient($event)"/>
      } @else {
        <div class="zoek-placeholder-container">
          <div class="zoek-placeholder">
            <ds-icon [icon]="gebruikerIcoon" size="xl"/>
            <span class="zoek-placeholder-titel">Zoek een cliënt</span>
            <p class="zoek-placeholder-tekst">
              @if (filterComponent()?.geavanceerdZoekenActief()) {
                Vul minstens 1 veld in om een<br/>
                cliënt te zoeken
              } @else {
                Vul geboortedatum en minstens<br/>
                1 extra veld in om een cliënt te<br/>
                zoeken
              }
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</app-page>
