<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
	<fieldset>
		<div wicket:id="gbaStatusInfo">
			<div class="row-fluid">
				<div class="span12">
					<legend>GBA status</legend>
				</div>
			</div>
			<div class="row-fluid">
				<div class="span6">
					<div class="control-group value">
						<label class="control-label">Indicatie status</label>
						<div class="controls">
							<span wicket:id="indicatieStatus"></span>
						</div>
					</div>
					<div class="control-group value">
						<label class="control-label">Datum laatste GBA mutatie</label>
						<div class="controls" wicket:id="laatsteGbaMutatie.mutatieDatum"></div>
					</div>
					<div class="control-group value">
						<label class="control-label">Laatst aangevraagd op</label>
						<div class="controls" wicket:id="laatstAangevraagdOp"></div>
					</div>
				</div>
			</div>
		</div>

		<div wicket:id="gbaVraag">
			<div class="row-fluid">
				<div class="span6">
					<div class="control-group value">
						<label class="control-label">Creatiemoment aanvraag</label>
						<div class="controls" wicket:id="creatieDatum"></div>
					</div>
					<div class="control-group value">
						<label class="control-label">Type</label>
						<div class="controls" wicket:id="vraagType"></div>
					</div>
					<div class="control-group value">
						<label class="control-label">Reden</label>
						<div class="controls" wicket:id="reden"></div>
					</div>
					<div class="control-group value">
						<label class="control-label">Afgehandeld</label>
						<div class="controls" wicket:id="reactieOntvangen"></div>
					</div>
				</div>
			</div>
		</div>
	</fieldset>
</wicket:panel>
</html>
